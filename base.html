<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BATIYANA{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="phone-frame">
  <div class="app-topbar">
    <div class="avatar-sm">{{ user.initials }}</div>
    <h1 class="topbar-title">{% block topbar_title %}BATIYANA{% endblock %}</h1>
    <div class="topbar-actions">
      <a href="{{ url_for('search') }}" class="icon-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
      <a href="{{ url_for('logout') }}" class="icon-btn" aria-label="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </div>

  <main class="app-content">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav">
    <a href="{{ url_for('home') }}" class="nav-item {% if active=='home' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      <span>Home</span>
    </a>
    <a href="{{ url_for('voice') }}" class="nav-item {% if active=='voice' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <span>Voice</span>
    </a>
    <a href="{{ url_for('grocery_list') }}" class="nav-item {% if active=='list' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>List</span>
    </a>
    <a href="{{ url_for('suggestions') }}" class="nav-item {% if active=='suggestions' %}active{% endif %}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2.05V17h6v-2.25c0-.85.4-1.55 1-2.05A7 7 0 0 0 12 2Z"/></svg>
      <span>Suggestions</span>
    </a>
    <a href="{{ url_for('profile') }}" class="nav-item {% if active=='profile' %}active{% endif %}">
      <div class="nav-avatar">{{ user.initials }}</div>
      <span>Profile</span>
    </a>
  </nav>
</div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
